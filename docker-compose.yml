services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sprout
      POSTGRES_PASSWORD: sprout
      POSTGRES_DB: sprout
    ports:
      - "5432:5432"
    volumes:
      - sprout-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprout -d sprout"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sprout-postgres:
