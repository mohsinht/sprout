name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, build, and test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://sprout:sprout@127.0.0.1:5432/sprout
      JWT_SECRET: ci-only-jwt-secret-at-least-thirty-two-characters
      CRON_SECRET: ci-only-cron-secret-at-least-thirty-two-characters
      API_BASE_URL: http://127.0.0.1:8787
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sprout
          POSTGRES_PASSWORD: sprout
          POSTGRES_DB: sprout
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sprout -d sprout"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @sprout/api db:migrate
      - run: pnpm check
      - run: pnpm lint
      - name: Start API and wait for readiness
        shell: bash
        run: |
          pnpm --filter @sprout/api start > /tmp/sprout-api.log 2>&1 &
          api_pid=$!
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "$API_BASE_URL/health" > /dev/null; then
              echo "API is ready (pid $api_pid)"
              exit 0
            fi
            if ! kill -0 "$api_pid" 2>/dev/null; then
              echo "API exited before becoming ready"
              cat /tmp/sprout-api.log
              exit 1
            fi
            sleep 1
          done
          echo "API did not become ready within 30 seconds"
          cat /tmp/sprout-api.log
          exit 1
      - run: pnpm --filter @sprout/api test

  mobile:
    name: Flutter lint, test, and Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: apps/mobile
      - run: flutter analyze
        working-directory: apps/mobile
      - run: flutter test --exclude-tags=golden --dart-define=SPROUT_ENV=dev
        working-directory: apps/mobile
      - name: Verify Android debug build
        run: >-
          flutter build apk --debug
          --dart-define=SPROUT_ENV=dev
        working-directory: apps/mobile

  goldens:
    name: Flutter visual regression tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: apps/mobile
      - run: flutter test --tags=golden --dart-define=SPROUT_ENV=dev
        working-directory: apps/mobile
