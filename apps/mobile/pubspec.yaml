name: sprout_mobile
description: A playful financial health companion for Pakistan.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  http: ^1.2.2
  intl: ^0.20.1
  lottie: ^3.3.1
  rive: ^0.13.20
  shared_preferences: ^2.5.3
  video_player: ^2.9.2
  sprout_motion:
    path: ../../packages/sprout_motion
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.2
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.1.0
  timezone: ^0.11.1
  file_picker: ^10.3.10
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # Single source of truth for the Sprout coin mascot.
    # The .riv file is optional at runtime — SproutMascot falls back to the
    # still/video assets, then the CustomPaint mascot when it is absent.
    - assets/mascot/
    - assets/mascot/stills/
    - assets/mascot/videos/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka/Fredoka-Variable.ttf
    - family: Nunito Sans
      fonts:
        - asset: assets/fonts/NunitoSans/NunitoSans-Variable.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Variable.ttf
